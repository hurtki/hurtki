<svg
  width="900"
  height="200"
  viewBox="0 0 900 200"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="titleId"
  preserveAspectRatio="xMidYMid meet"
>
  <title id="titleId">GitHub Stats</title>

  <defs>
    <!-- Subtle gradient for accent -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.8" />
    </linearGradient>
    
    <!-- Soft glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Clean background -->
  <rect width="900" height="200" fill="#0d1117" />
  
  <!-- Subtle top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#accentGrad)" opacity="0.6" />

  <!-- Header Section -->
  <g transform="translate(40 35)">
    <!-- Avatar placeholder circle -->
    <circle cx="28" cy="20" r="28" fill="#21262d" />
    <text x="28" y="26" text-anchor="middle" fill="#58a6ff" font-family="JetBrains Mono, Consolas, monospace" font-size="20" font-weight="700">DN</text>
    
    <!-- Name and title -->
    <text x="72" y="15" fill="#f0f6fc" font-family="JetBrains Mono, Consolas, monospace" font-size="20" font-weight="700">developer_name</text>
    <text x="72" y="35" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="13">Full-stack Developer</text>
  </g>

  <!-- Stats Grid - Clean layout without card borders -->
  <g transform="translate(40 85)">
    <!-- Stars -->
    <g transform="translate(0 0)">
      <text x="0" y="0" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500" text-transform="uppercase" letter-spacing="0.5">Stars</text>
      <text x="0" y="30" fill="#f0f6fc" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700">1,247</text>
      <!-- Sparkline -->
      <polyline
        points="0,50 18,46 36,52 54,42 72,48 90,38 108,44 126,34"
        fill="none"
        stroke="#e3b341"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.7"
      />
      <g transform="translate(90 22)">
        <polygon points="0,6 4,0 8,6" fill="#3fb950" />
        <text x="12" y="6" fill="#3fb950" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600">+12%</text>
      </g>
    </g>

    <!-- Commits -->
    <g transform="translate(180 0)">
      <text x="0" y="0" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500">Commits</text>
      <text x="0" y="30" fill="#f0f6fc" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700">3,842</text>
      <!-- Progress ring -->
      <g transform="translate(110 25)">
        <circle cx="20" cy="20" r="18" fill="none" stroke="#21262d" stroke-width="3" />
        <circle
          cx="20"
          cy="20"
          r="18"
          fill="none"
          stroke="#3fb950"
          stroke-width="3"
          stroke-linecap="round"
          stroke-dasharray="90"
          stroke-dashoffset="18"
          transform="rotate(-90 20 20)"
        />
        <text x="20" y="24" text-anchor="middle" fill="#f0f6fc" font-family="JetBrains Mono, Consolas, monospace" font-size="10" font-weight="600">80%</text>
      </g>
      <text x="0" y="58" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="10">goal: 4,800</text>
    </g>

    <!-- PRs -->
    <g transform="translate(360 0)">
      <text x="0" y="0" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500">Pull Requests</text>
      <text x="0" y="30" fill="#f0f6fc" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700">284</text>
      <!-- Mini bar chart -->
      <g transform="translate(90 10)">
        <rect x="0" y="30" width="10" height="15" rx="2" fill="#a371f7" opacity="0.3" />
        <rect x="14" y="22" width="10" height="23" rx="2" fill="#a371f7" opacity="0.5" />
        <rect x="28" y="14" width="10" height="31" rx="2" fill="#a371f7" opacity="0.7" />
        <rect x="42" y="6" width="10" height="39" rx="2" fill="#a371f7" />
      </g>
    </g>

    <!-- Issues -->
    <g transform="translate(540 0)">
      <text x="0" y="0" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500">Issues</text>
      <text x="0" y="30" fill="#f0f6fc" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700">156</text>
      <!-- Closed/Open bar -->
      <g transform="translate(0 45)">
        <rect x="0" y="0" width="120" height="5" rx="2.5" fill="#21262d" />
        <rect x="0" y="0" width="96" height="5" rx="2.5" fill="#3fb950" />
      </g>
      <text x="0" y="62" fill="#3fb950" font-family="Inter, -apple-system, sans-serif" font-size="10">125 closed</text>
      <text x="65" y="62" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="10">31 open</text>
    </g>

    <!-- Streak -->
    <g transform="translate(720 0)">
      <text x="0" y="0" fill="#f0883e" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="600">Streak</text>
      <text x="0" y="30" fill="#f0f6fc" font-family="JetBrains Mono, Consolas, monospace" font-size="28" font-weight="700">23</text>
      <text x="48" y="30" fill="#7d8590" font-family="Inter, -apple-system, sans-serif" font-size="14">days</text>
      <!-- Week dots -->
      <g transform="translate(0 45)">
        <circle cx="5" cy="5" r="5" fill="#3fb950" />
        <circle cx="18" cy="5" r="5" fill="#3fb950" />
        <circle cx="31" cy="5" r="5" fill="#3fb950" />
        <circle cx="44" cy="5" r="5" fill="#3fb950" />
        <circle cx="57" cy="5" r="5" fill="#3fb950" />
        <circle cx="70" cy="5" r="5" fill="#3fb950" />
        <circle cx="83" cy="5" r="5" fill="#21262d" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="3 2">
          <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>
  </g>

  <!-- Languages - minimal style -->
  <g transform="translate(40 170)">
    <!-- Progress bar -->
    <rect x="0" y="0" width="820" height="4" rx="2" fill="#21262d" />
    <rect x="0" y="0" width="270" height="4" rx="2" fill="#3178c6" />
    <rect x="270" y="0" width="213" height="4" fill="#f1e05a" />
    <rect x="483" y="0" width="164" height="4" fill="#3572A5" />
    <rect x="647" y="0" width="98" height="4" fill="#00ADD8" />
    <rect x="745" y="0" width="75" height="4" rx="2" fill="#e34c26" />
    
    <!-- Labels -->
    <g transform="translate(0 18)">
      <circle cx="4" cy="4" r="4" fill="#3178c6" />
      <text x="14" y="8" fill="#c9d1d9" font-family="Inter, -apple-system, sans-serif" font-size="11">TypeScript 33%</text>
      
      <circle cx="130" cy="4" r="4" fill="#f1e05a" />
      <text x="140" y="8" fill="#c9d1d9" font-family="Inter, -apple-system, sans-serif" font-size="11">JavaScript 26%</text>
      
      <circle cx="270" cy="4" r="4" fill="#3572A5" />
      <text x="280" y="8" fill="#c9d1d9" font-family="Inter, -apple-system, sans-serif" font-size="11">Python 20%</text>
      
      <circle cx="385" cy="4" r="4" fill="#00ADD8" />
      <text x="395" y="8" fill="#c9d1d9" font-family="Inter, -apple-system, sans-serif" font-size="11">Go 12%</text>
      
      <circle cx="475" cy="4" r="4" fill="#e34c26" />
      <text x="485" y="8" fill="#c9d1d9" font-family="Inter, -apple-system, sans-serif" font-size="11">HTML 9%</text>
    </g>
  </g>
</svg>
