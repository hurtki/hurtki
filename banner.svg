<svg
  width="900"
  height="220"
  viewBox="0 0 900 220"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="titleId"
  preserveAspectRatio="xMidYMid meet"
>
  <title id="titleId">GitHub Stats</title>

  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" />
      <stop offset="50%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#00ff88" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="896" height="216" rx="8" fill="#0d1117" />

  <!-- Animated neon border -->
  <rect
    x="2"
    y="2"
    width="896"
    height="216"
    rx="8"
    fill="none"
    stroke="url(#neonGradient)"
    stroke-width="2"
    stroke-dasharray="60 2180"
    filter="url(#glow)"
  >
    <animate
      attributeName="stroke-dashoffset"
      values="0;-2240"
      dur="4s"
      repeatCount="indefinite"
    />
  </rect>

  <rect
    x="2"
    y="2"
    width="896"
    height="216"
    rx="8"
    fill="none"
    stroke="url(#neonGradient)"
    stroke-width="2"
    stroke-dasharray="60 2180"
    opacity="0.5"
    filter="url(#glow)"
  >
    <animate
      attributeName="stroke-dashoffset"
      values="-560;-2800"
      dur="4s"
      repeatCount="indefinite"
    />
  </rect>

  <rect
    x="2"
    y="2"
    width="896"
    height="216"
    rx="8"
    fill="none"
    stroke="#30363d"
    stroke-width="1"
  />

  <!-- Header -->
  <g transform="translate(24 24)">
    <text
      x="0"
      y="17"
      fill="#c9d1d9"
      font-size="18"
      font-weight="600"
      font-family="Segoe UI, Ubuntu, sans-serif"
    >
      developer_name
    </text>
    <text
      x="170"
      y="17"
      fill="#8b949e"
      font-size="14"
      font-family="Segoe UI, Ubuntu, sans-serif"
    >
      Full-stack developer
    </text>
  </g>

  <!-- Cards -->
  <g transform="translate(24 55)">
    <!-- Stars -->
    <g>
      <rect width="165" height="70" rx="8" fill="#161b22" stroke="#30363d" />
      <text x="12" y="24" fill="#8b949e" font-size="11">Total Stars</text>
      <text x="12" y="50" fill="#c9d1d9" font-size="24" font-weight="700">1,247</text>
      <polyline
        points="12,62 30,58 48,64 66,55 84,60 102,52 120,56 138,48 153,54"
        fill="none"
        stroke="#e3b341"
        stroke-width="2"
        opacity="0.6"
      />
    </g>

    <!-- Commits -->
    <g transform="translate(180 0)">
      <rect width="165" height="70" rx="8" fill="#161b22" stroke="#30363d" />
      <text x="12" y="24" fill="#8b949e" font-size="11">Commits (2025)</text>
      <text x="12" y="50" fill="#c9d1d9" font-size="24" font-weight="700">3,842</text>

      <circle cx="140" cy="35" r="22" stroke="#21262d" stroke-width="4" fill="none" />
      <circle
        cx="140"
        cy="35"
        r="22"
        stroke="#3fb950"
        stroke-width="4"
        fill="none"
        stroke-dasharray="110"
        stroke-dashoffset="22"
        transform="rotate(-90 140 35)"
      />
      <text x="140" y="39" text-anchor="middle" fill="#c9d1d9" font-size="11">80%</text>
    </g>

    <!-- PRs -->
    <g transform="translate(360 0)">
      <rect width="165" height="70" rx="8" fill="#161b22" stroke="#30363d" />
      <text x="12" y="24" fill="#8b949e" font-size="11">Pull Requests</text>
      <text x="12" y="50" fill="#c9d1d9" font-size="24" font-weight="700">284</text>

      <g transform="translate(90 30)">
        <rect x="0" y="25" width="8" height="10" fill="#a371f7" opacity="0.4" />
        <rect x="12" y="18" width="8" height="17" fill="#a371f7" opacity="0.6" />
        <rect x="24" y="12" width="8" height="23" fill="#a371f7" opacity="0.8" />
        <rect x="36" y="5" width="8" height="30" fill="#a371f7" />
      </g>
    </g>

    <!-- Streak -->
    <g transform="translate(540 0)">
      <rect width="165" height="70" rx="8" fill="#161b22" stroke="#f0883e" />
      <text x="12" y="24" fill="#f0883e" font-size="11" font-weight="600">Current Streak</text>
      <text x="12" y="50" fill="#c9d1d9" font-size="24" font-weight="700">23</text>
      <text x="50" y="50" fill="#8b949e" font-size="14">days</text>
    </g>
  </g>

  <!-- Languages -->
  <g transform="translate(24 145)">
    <text y="12" fill="#8b949e" font-size="12">Most Used Languages</text>

    <rect y="20" width="851" height="8" rx="4" fill="#161b22" />
    <rect y="20" width="280" height="8" rx="4" fill="#3178c6" />
    <rect x="280" y="20" width="220" height="8" fill="#f1e05a" />
    <rect x="500" y="20" width="170" height="8" fill="#3572A5" />
    <rect x="670" y="20" width="100" height="8" fill="#00ADD8" />
    <rect x="770" y="20" width="81" height="8" rx="4" fill="#e34c26" />
  </g>
</svg>
